<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Movie Generator</title>
        <link rel="stylesheet" href="styles.css" />
    </head>
    <body>
        <header class="hero">
            <div class="hero-content">
                <h1 class="hero-heading">Movie Generator</h1>
                <p class="hero-p">Let's choose a movie for you.</p>
            </div>
        </header>
        <main>
            <div class="title-length">
                <h2>Choose movies based on title length</h2>
                <button class="short-title">Short title</button>
                <button class="long-title">Long title</button>
            </div>
            <div class="year-of-made">
                <h2>Choose movies based on the years they were made</h2>
                <button class="eighties">Made between 1980-1989</button>
            </div>
            <div class="year-of-made">
                <h2>Choose movies based on the ratings</h2>
                <button class="good">Good</button>
                <button class="average">Average</button>
                <button class="bad">Bad</button>
            </div>
        </main>
        <script src="script.js"></script>
    </body>
</html>
