<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Screenshot Saver</title>
        <link rel="stylesheet" href="styles.css" />
    </head>
    <body>
        <h1 id="header">Screenshot Saver</h1>
        <div class="form-container">
            <input id="link-input" type="text" placeholder="Paste a link" />
            <button id="screenshot-button">Take a screenshot</button>
            <button id="save-button">Save screenshot</button>
        </div>
        <div class="preview-container"></div>
        <div class="list-container">
            <h2 id="header2">Saved screenshots</h2>
            <div id="saved-list"></div>
        </div>
        <script type="module" src="script.js"></script>
    </body>
</html>
