<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Movie Generator</title>
        <link rel="stylesheet" href="styles.css" />
    </head>
    <body>
        <div class="hero-content">
            <h1 class="hero-heading">Movie Generator</h1>
            <p class="hero-p">Let's choose a movie for you.</p>
        </div>
        <div class="buttons">
            <button class="short-button">Short title</button>
            <button class="long-button">Long title</button>
            <button class="eighties-button">80's Movies</button>
            <button class="good-button">Good</button>
            <button class="average-button">Average</button>
            <button class="bad-button">Bad</button>
            <button class="rating-above-6">Ratings above 6</button>
            <button class="keywords-button">Movies with keywords</button>
            <button class="duplicated-words">Duplicated words</button>
        </div>
        <div class="results"></div>
        <div class="pagination">
            <button class="see-more-button">See more...</button>
        </div>
        <script type="module" src="script.js"></script>
    </body>
</html>
